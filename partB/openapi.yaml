openapi: 3.0.0
info:
  title: URL Shortener API
  version: 1.0.0

paths:
  /api/v1/shorten:
    post:
      summary: URL богиносгох
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [original_url]
              properties:
                original_url:
                  type: string
                  format: uri
                expires_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Амжилттай
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UrlResponse"
        "422":
          description: Validation error

  /api/v1/urls:
    get:
      summary: Бүх URL жагсаалт
      responses:
        "200":
          description: URL-уудын жагсаалт
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UrlResponse"

  /api/v1/urls/{short_code}:
    get:
      summary: Нэг URL харах
      parameters:
        - name: short_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: URL олдсон
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UrlResponse"
        "404":
          description: URL олдсонгүй
    delete:
      summary: URL устгах
      parameters:
        - name: short_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Устгагдсан
        "404":
          description: URL олдсонгүй

  /{short_code}:
    get:
      summary: Redirect хийх
      parameters:
        - name: short_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect
        "404":
          description: URL олдсонгүй
        "410":
          description: URL хугацаа дууссан

components:
  schemas:
    UrlResponse:
      type: object
      properties:
        id:
          type: integer
        original_url:
          type: string
        short_code:
          type: string
        click_count:
          type: integer
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
